<script>
  const scriptURL = 'https://script.google.com/a/macros/ifood.com.br/s/AKfycby_c7k0_KAX7-vK90selOcfz0VrzHwtCFYavhRQ6zgOQKcGww9R3mghra0C_EcypE7xpQ/exec'; // O link /exec
  const form = document.getElementById('healthForm');

  form.addEventListener('submit', e => {
    e.preventDefault();
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.innerText = "Enviando...";

    // Criamos um objeto com os dados do formulário
    const formData = new FormData(form);
    
    // Transformamos em uma URL amigável para o Google
    const queryString = new URLSearchParams(formData).toString();

    // Enviamos usando uma técnica que ignora o bloqueio de domínio (CORS)
    fetch(`${scriptURL}?${queryString}`, {
      method: 'POST',
      mode: 'no-cors' 
    })
    .then(() => {
        alert("Enviado com sucesso! Verifique a planilha.");
        form.reset();
        submitBtn.disabled = false;
        submitBtn.innerText = "Enviar Checkpoint";
    })
    .catch(error => {
        alert("Erro ao enviar. Tente novamente.");
        submitBtn.disabled = false;
    });
  });
</script>
