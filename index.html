<script>
document.getElementById('gestanteForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const data = Object.fromEntries(new FormData(this).entries());

  const url =
    'https://script.google.com/macros/s/AKfycbwxxKwC6QorFSKIjSGjRXprfXMaTHw8cL2WiRnr0vNgG5FR1PWYBfdW5mbLuTy5cU5g/exec?' +
    new URLSearchParams(data).toString();

  fetch(url)
    .then(response => response.text())
    .then(result => {
      console.log(result);
      alert('Dados enviados com sucesso!');
      document.getElementById('gestanteForm').reset();
    })
    .catch(error => {
      console.error(error);
      alert('Erro ao enviar');
    });
});
</script>
