<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkpoint Saúde Gestante</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f7f9fc;
  margin: 0;
  padding: 40px;
}

.container {
  max-width: 950px;
  margin: auto;
  background: white;
  padding: 32px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h1 {
  text-align: center;
  color: #4f46e5;
  margin-bottom: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

label {
  display: block;
  font-weight: bold;
  margin-bottom: 8px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
  font-size: 14px;
}

textarea {
  min-height: 90px;
}

.full {
  grid-column: span 2;
}

button {
  width: 100%;
  margin-top: 30px;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #4f46e5;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #4338ca;
}
</style>
</head>
<body>

<div class="container">
<h1>Checkpoint Saúde Gestante</h1>

<form id="gestanteForm">

<div class="grid">

<div>
<label>Nome</label>
<input type="text" name="nome" required>
</div>

<div>
<label>Email</label>
<input type="email" name="email">
</div>

<div>
<label>Peso</label>
<input type="text" name="peso">
</div>

<div>
<label>Altura</label>
<input type="text" name="altura">
</div>

<div>
<label>Estado Civil</label>
<input type="text" name="estadoCivil">
</div>

<div>
<label>DPP</label>
<input type="date" name="dpp">
</div>

<div>
<label>DUM</label>
<input type="date" name="dum">
</div>

<div>
<label>Idade Gestacional</label>
<input type="text" name="idadeGestacional">
</div>

<div>
<label>Primeira Gestação?</label>
<select name="primeiraGestacao">
<option>Sim</option>
<option>Não</option>
</select>
</div>

<div>
<label>Tipo de Gestação</label>
<input type="text" name="tipoGestacao">
</div>

<div class="full">
<label>Histórico Clínico</label>
<textarea name="historicoClinico"></textarea>
</div>

<div class="full">
<label>Diagnósticos</label>
<textarea name="diagnosticos"></textarea>
</div>

<div class="full">
<label>Medicamentos</label>
<textarea name="medicamentos"></textarea>
</div>

<div class="full">
<label>Intercorrências</label>
<textarea name="intercorrencias"></textarea>
</div>

</div>

<button type="submit">Enviar</button>

</form>
</div>

<script>
document.getElementById('gestanteForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const formData = new FormData(this);
  const data = Object.fromEntries(formData.entries());

  try {
    const response = await fetch('/api/save', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    if (response.ok) {
      alert('Dados enviados com sucesso!');
      this.reset();
      console.log(result);
    } else {
      alert('Erro ao enviar');
      console.log(result);
    }

  } catch (error) {
    console.error(error);
    alert('Erro ao enviar');
  }
});
</script>
</body>
</html>
